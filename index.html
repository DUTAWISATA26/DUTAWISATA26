<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Rate Card Hub</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================================================
           CSS Styling - Creator Rate Card Hub
           ========================================================================== */

        :root {
            --font-heading: 'Outfit', 'Plus Jakarta Sans', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;

            --transition-fast: 0.2s ease;
            --transition-normal: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.5s cubic-bezier(0.4, 0, 0.2, 1);

            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 8px 20px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.12);
            --shadow-glow: 0 0 20px rgba(var(--accent-rgb), 0.3);

            --color-gold: 212, 175, 55;
            --color-rose: 236, 72, 153;
            --color-cyan: 6, 182, 212;
            --color-orange: 249, 115, 22;

            --accent-rgb: var(--color-gold);
            --accent-color: rgb(var(--accent-rgb));
        }

        .dark-theme {
            --bg-app: #090b11;
            --bg-card: rgba(17, 22, 34, 0.75);
            --bg-card-hover: rgba(26, 33, 50, 0.85);
            --bg-header: rgba(13, 17, 28, 0.8);
            --border-color: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.12);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --bg-input: rgba(15, 23, 42, 0.6);
            --bg-pill: rgba(255, 255, 255, 0.05);
            --glass-opacity: 0.75;
            --glow-opacity: 0.15;
        }

        .light-theme {
            --bg-app: #f4f6fa;
            --bg-card: rgba(255, 255, 255, 0.75);
            --bg-card-hover: rgba(255, 255, 255, 0.9);
            --bg-header: rgba(255, 255, 255, 0.8);
            --border-color: rgba(0, 0, 0, 0.06);
            --border-hover: rgba(0, 0, 0, 0.12);
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --bg-input: rgba(255, 255, 255, 0.8);
            --bg-pill: rgba(0, 0, 0, 0.04);
            --glass-opacity: 0.8;
            --glow-opacity: 0.08;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-primary);
            font-family: var(--font-body);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color var(--transition-normal), color var(--transition-normal);
            position: relative;
        }

        .bg-glow {
            position: fixed;
            width: 60vw;
            height: 60vw;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            pointer-events: none;
            opacity: var(--glow-opacity);
            transition: background-color var(--transition-slow);
        }

        .bg-glow-1 {
            top: -20%;
            left: -10%;
            background-color: rgb(var(--accent-rgb));
        }

        .bg-glow-2 {
            bottom: -20%;
            right: -10%;
            background-color: rgba(var(--accent-rgb), 0.5);
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            min-height: 100vh;
        }

        .app-header {
            background-color: var(--bg-header);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            box-shadow: var(--shadow-sm);
            z-index: 10;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent-color), rgba(var(--accent-rgb), 0.6));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.25rem;
            box-shadow: var(--shadow-glow);
            transition: transform var(--transition-normal), background var(--transition-normal);
        }

        .logo-area h1 {
            font-family: var(--font-heading);
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            line-height: 1.1;
        }

        .logo-area .subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .search-filter-box {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-grow: 1;
            max-width: 700px;
        }

        .search-input-wrapper {
            position: relative;
            flex-grow: 1;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        #search-input {
            width: 100%;
            padding: 10px 14px 10px 42px;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.9rem;
            outline: none;
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
        }

        #search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.15);
        }

        .category-filters {
            display: flex;
            gap: 8px;
        }

        .filter-btn {
            background-color: var(--bg-pill);
            border: 1px solid transparent;
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 10px;
            font-family: var(--font-body);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .filter-btn:hover {
            color: var(--text-primary);
            background-color: var(--border-color);
        }

        .filter-btn.active {
            background-color: var(--accent-color);
            color: #fff;
            box-shadow: var(--shadow-glow);
        }

        .header-actions {
            display: flex;
            align-items: center;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background-color: var(--bg-pill);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.05rem;
            transition: all var(--transition-fast);
        }

        .icon-btn:hover {
            color: var(--text-primary);
            border-color: var(--border-hover);
            transform: translateY(-2px);
        }

        .dark-theme .icon-sun,
        .light-theme .icon-moon {
            display: none;
        }

        /* ==========================================================================
           Main Layout & Content Grid
           ========================================================================== */
        .main-content {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 24px;
            flex-grow: 1;
        }

        .section-title {
            font-family: var(--font-heading);
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .creator-count {
            font-size: 0.85rem;
            font-weight: 500;
            background-color: var(--bg-pill);
            padding: 2px 8px;
            border-radius: 20px;
            color: var(--text-muted);
        }

        .creator-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px;
        }

        .creator-card {
            background-color: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 20px;
            cursor: pointer;
            transition: transform var(--transition-normal), border-color var(--transition-normal), box-shadow var(--transition-normal);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        .creator-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, rgb(var(--card-accent-rgb, var(--accent-rgb))), transparent);
            opacity: 0;
            transition: opacity var(--transition-normal);
        }

        .creator-card:hover {
            transform: translateY(-6px);
            border-color: rgba(var(--card-accent-rgb, var(--accent-rgb)), 0.4);
            box-shadow: var(--shadow-md), 0 10px 20px rgba(var(--card-accent-rgb, var(--accent-rgb)), 0.05);
        }

        .creator-card:hover::before {
            opacity: 1;
        }

        .creator-card.active {
            border-color: rgb(var(--card-accent-rgb, var(--accent-rgb)));
            box-shadow: var(--shadow-md), 0 0 15px rgba(var(--card-accent-rgb, var(--accent-rgb)), 0.15);
            background-color: var(--bg-card-hover);
        }

        .creator-card.active::before {
            opacity: 1;
        }

        .card-top {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }

        .avatar-wrapper {
            position: relative;
            width: 68px;
            height: 68px;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid var(--border-color);
            transition: border-color var(--transition-normal);
            flex-shrink: 0;
        }

        .creator-card:hover .avatar-wrapper,
        .creator-card.active .avatar-wrapper {
            border-color: rgb(var(--card-accent-rgb, var(--accent-rgb)));
        }

        .avatar-svg-placeholder {
            width: 100%;
            height: 100%;
            display: block;
        }

        .card-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card-name {
            font-family: var(--font-heading);
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 4px;
        }

        .card-niche {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .card-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.4;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 18px;
        }

        .tag-badge {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 6px;
            background-color: var(--bg-pill);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            padding-top: 14px;
            margin-top: auto;
        }

        .price-range {
            display: flex;
            flex-direction: column;
        }

        .price-range-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
        }

        .price-range-value {
            font-size: 0.95rem;
            font-weight: 800;
            color: rgb(var(--card-accent-rgb, var(--accent-rgb)));
        }

        .select-arrow {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background-color: var(--bg-pill);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: all var(--transition-fast);
        }

        .creator-card:hover .select-arrow {
            background-color: rgb(var(--card-accent-rgb, var(--accent-rgb)));
            color: #fff;
            transform: translateX(4px);
            box-shadow: 0 4px 10px rgba(var(--card-accent-rgb, var(--accent-rgb)), 0.3);
        }

        .creator-card.active .select-arrow {
            background-color: rgb(var(--card-accent-rgb, var(--accent-rgb)));
            color: #fff;
        }

        .skeleton-card {
            height: 220px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            position: relative;
            overflow: hidden;
        }

        .skeleton-card::after {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            animation: skeleton-sweep 1.5s infinite;
        }

        @keyframes skeleton-sweep {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* ==========================================================================
           Details & Calculator Drawer View
           ========================================================================== */
        .detail-section {
            position: sticky;
            top: 20px;
            height: calc(100vh - 120px);
        }

        .empty-state-detail {
            background-color: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px dashed var(--border-color);
            border-radius: 20px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }

        .empty-icon {
            font-size: 3rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state-detail h3 {
            font-family: var(--font-heading);
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .empty-state-detail p {
            font-size: 0.85rem;
            color: var(--text-muted);
            max-width: 320px;
            line-height: 1.5;
        }

        .creator-detail-card {
            background-color: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: var(--shadow-lg);
        }

        .detail-banner {
            height: 120px;
            background: linear-gradient(135deg, rgba(var(--accent-rgb), 0.3) 0%, rgba(var(--accent-rgb), 0.05) 100%);
            position: relative;
        }

        .detail-banner::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: linear-gradient(to top, var(--bg-card), transparent);
        }

        .detail-profile {
            display: flex;
            align-items: flex-end;
            gap: 18px;
            padding: 0 24px;
            margin-top: -50px;
            position: relative;
            z-index: 2;
        }

        .detail-avatar-wrapper {
            width: 90px;
            height: 90px;
            border-radius: 22px;
            overflow: hidden;
            border: 4px solid var(--bg-card);
            box-shadow: var(--shadow-md);
            background-color: var(--bg-app);
        }

        .detail-meta {
            padding-bottom: 8px;
        }

        .detail-name-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detail-name {
            font-family: var(--font-heading);
            font-size: 1.4rem;
            font-weight: 800;
            line-height: 1.2;
        }

        .verified-badge {
            color: var(--accent-color);
            font-size: 0.95rem;
        }

        .detail-niche {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
            margin-top: 2px;
        }

        .detail-body {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .detail-bio {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .social-stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .stat-box {
            background-color: var(--bg-pill);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .stat-icon {
            font-size: 1rem;
            color: var(--text-muted);
        }

        .stat-value {
            font-size: 0.95rem;
            font-weight: 800;
            font-family: var(--font-heading);
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .services-title {
            font-family: var(--font-heading);
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .select-all-btn {
            background: none;
            border: none;
            font-family: var(--font-body);
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent-color);
            cursor: pointer;
            transition: opacity var(--transition-fast);
        }

        .select-all-btn:hover {
            text-decoration: underline;
            opacity: 0.8;
        }

        .services-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .service-item {
            background-color: var(--bg-pill);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all var(--transition-fast);
        }

        .service-item:hover {
            border-color: rgba(var(--accent-rgb), 0.3);
            background-color: var(--bg-card-hover);
        }

        .service-item.selected {
            border-color: var(--accent-color);
            background-color: rgba(var(--accent-rgb), 0.05);
        }

        .service-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-grow: 1;
        }

        .service-checkbox {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            border: 2px solid var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 0.75rem;
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }

        .service-item.selected .service-checkbox {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
        }

        .service-info {
            display: flex;
            flex-direction: column;
        }

        .service-name {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .service-desc {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .service-price {
            font-family: var(--font-heading);
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--accent-color);
        }

        .detail-footer {
            background-color: var(--bg-header);
            border-top: 1px solid var(--border-color);
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .calculator-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .calc-label {
            display: flex;
            flex-direction: column;
        }

        .calc-title {
            font-size: 0.85rem;
            font-weight: 700;
        }

        .calc-subtitle {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .calc-total {
            font-family: var(--font-heading);
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--accent-color);
            transition: transform var(--transition-fast);
        }

        .calc-total.animate {
            transform: scale(1.08);
        }

        .contact-btn {
            width: 100%;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-family: var(--font-body);
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.25);
            transition: all var(--transition-fast);
            text-decoration: none;
        }

        .contact-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
            filter: brightness(1.08);
        }

        .contact-btn:active {
            transform: translateY(0);
        }

        .contact-btn i {
            font-size: 1.15rem;
        }

        .creator-social-links {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }

        .social-pill-link {
            background-color: var(--bg-pill);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all var(--transition-fast);
        }

        .social-pill-link:hover {
            color: var(--text-primary);
            border-color: var(--border-hover);
            background-color: var(--bg-card-hover);
        }

        .detail-body::-webkit-scrollbar {
            width: 6px;
        }

        .detail-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .detail-body::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        .detail-body::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

                        <div class="calc-total" id="calc-total">Rp0</div>
                    </div>
                    <button class="contact-btn" id="whatsapp-order-btn">
                        <i class="fa-brands fa-whatsapp"></i> Hubungi untuk Kolaborasi
                    </button>
                </div>
            `;

            setupDetailEventListeners(creator);
        }

        // --- HOOK LISTENERS ---
        function setupDetailEventListeners(creator) {
            document.querySelectorAll(".service-item").forEach(item => {
                item.addEventListener("click", () => {
                    const serviceId = item.getAttribute("data-service-id");
                    if (selectedServices.has(serviceId)) {
                        selectedServices.delete(serviceId);
                        item.classList.remove("selected");
                    } else {
                        selectedServices.add(serviceId);
                        item.classList.add("selected");
                    }
                    updateCalculator();
                });
            });

            const selectAllBtn = document.getElementById("select-all-btn");
            selectAllBtn.addEventListener("click", () => {
                const allSelected = selectedServices.size === creator.services.length;
                document.querySelectorAll(".service-item").forEach(item => {
                    const serviceId = item.getAttribute("data-service-id");
                    if (allSelected) {
                        selectedServices.delete(serviceId);
                        item.classList.remove("selected");
                    } else {
                        selectedServices.add(serviceId);
                        item.classList.add("selected");
                    }
                });
                selectAllBtn.textContent = allSelected ? "Pilih Semua" : "Hapus Semua";
                updateCalculator();
            });

            document.getElementById("whatsapp-order-btn").addEventListener("click", () => {
                openWhatsAppChat(creator);
            });

            document.getElementById("mobile-close-btn").addEventListener("click", closeMobileDrawer);
        }

        // --- CALCULATOR CALCULATION ---
        function updateCalculator() {
            if (!activeCreator) return;
            
            let total = 0;
            activeCreator.services.forEach(service => {
                if (selectedServices.has(service.id)) {
                    total += service.price;
                }
            });

            const totalEl = document.getElementById("calc-total");
            const countLabelEl = document.getElementById("selected-count-label");

            totalEl.classList.add("animate");
            setTimeout(() => totalEl.classList.remove("animate"), 150);

            totalEl.textContent = formatRupiah(total);
            countLabelEl.textContent = `${selectedServices.size} Layanan dipilih`;

            const selectAllBtn = document.getElementById("select-all-btn");
            if (selectAllBtn) {
                if (selectedServices.size === activeCreator.services.length) {
                    selectAllBtn.textContent = "Hapus Semua";
                } else {
                    selectAllBtn.textContent = "Pilih Semua";
                }
            }
        }

        // --- MOBILE DRAWER CLOSE ---
        function closeMobileDrawer() {
            detailSection.classList.remove("active");
            overlay.classList.remove("active");
        }

        // --- WHATSAPP TEXT BUILDER ---
        function openWhatsAppChat(creator) {
            const baseText = `Halo ${creator.name}, saya tertarik untuk bekerjasama.`;
            let servicesText = "";
            let totalAmount = 0;

            if (selectedServices.size > 0) {
                servicesText = "\n\nSaya ingin memesan layanan berikut:\n";
                creator.services.forEach(service => {
                    if (selectedServices.has(service.id)) {
                        servicesText += `- ${service.name} (${formatRupiah(service.price)})\n`;
                        totalAmount += service.price;
                    }
                });
                servicesText += `\n*Total Estimasi: ${formatRupiah(totalAmount)}*`;
            } else {
                servicesText = "\n\nBisa minta info lengkap mengenai slot kerjasama & detail rate card Anda?";
            }

            const footerText = `\n\nHubungi saya kembali di nomor ini ya. Terima kasih!`;
            const fullMessage = encodeURIComponent(baseText + servicesText + footerText);
            const whatsappUrl = `https://wa.me/${creator.socials.whatsapp}?text=${fullMessage}`;
            window.open(whatsappUrl, "_blank");
        }

        // --- SEARCH & FILTER LISTENERS ---
        searchInput.addEventListener("input", (e) => {
            searchQuery = e.target.value.toLowerCase().trim();
            renderCreatorList();
        });

        filterBtns.forEach(btn => {
            btn.addEventListener("click", () => {
                filterBtns.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                selectedCategory = btn.getAttribute("data-category");
                renderCreatorList();
            });
        });

        overlay.addEventListener("click", closeMobileDrawer);

        // --- THEME TOGGLE ---
        themeToggleBtn.addEventListener("click", () => {
            if (document.body.classList.contains("dark-theme")) {
                document.body.classList.replace("dark-theme", "light-theme");
                localStorage.setItem("theme", "light");
            } else {
                document.body.classList.replace("light-theme", "dark-theme");
                localStorage.setItem("theme", "dark");
            }
        });

        const savedTheme = localStorage.getItem("theme") || "dark";
        if (savedTheme === "light") {
            document.body.classList.replace("dark-theme", "light-theme");
        }

        // --- INIT ---
        window.addEventListener("DOMContentLoaded", () => {
            renderCreatorList();
        });
    </script>
</body>
</html>
